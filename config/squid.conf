# Squid proxy config - Slack API + Search Engines
# All other domains are blocked. HTTPS only. No caching.

# --- Port ---
http_port 3128

# --- ACLs ---

# Slack domains (CONNECT for HTTPS tunneling)
acl slack_domains dstdomain .slack.com
acl slack_domains dstdomain .slack-edge.com

# Search engine domains (for SearXNG aggregation)
acl search_engines dstdomain .google.com
acl search_engines dstdomain .googleapis.com
acl search_engines dstdomain duckduckgo.com
acl search_engines dstdomain .bing.com
acl search_engines dstdomain api.github.com
acl search_engines dstdomain .stackoverflow.com
acl search_engines dstdomain .stackexchange.com
acl search_engines dstdomain arxiv.org
acl search_engines dstdomain .wikipedia.org
acl search_engines dstdomain registry.npmjs.org
acl search_engines dstdomain pypi.org
acl search_engines dstdomain hub.docker.com

# HTTPS only
acl SSL_ports port 443
acl CONNECT method CONNECT

# --- Access rules ---

# Allow CONNECT (HTTPS) to Slack and search engines on port 443
http_access allow CONNECT SSL_ports slack_domains
http_access allow CONNECT SSL_ports search_engines

# Cache manager access (for healthcheck)
acl manager url_regex -i ^cache_object:// /squid-internal-mgr/
http_access allow localhost manager

# Deny everything else
http_access deny all

# --- Privacy / Security ---

# Don't reveal proxy existence
via off
forwarded_for delete
request_header_access X-Forwarded-For deny all

# Suppress version info
httpd_suppress_version_string on
visible_hostname proxy

# Disable ICP (defense-in-depth)
icp_port 0

# Connection timeouts
connect_timeout 30 seconds
read_timeout 60 seconds

# --- Caching ---

# Disable caching (API responses should not be cached)
cache deny all

# --- Body limits ---
# NOTE: request_body_max_size and reply_body_max_size are not effective for
# CONNECT tunnels (which is how all HTTPS/Slack traffic flows through this proxy).
# Squid cannot inspect or limit the body of encrypted tunneled connections.

# --- Logging ---

# Access log (mounted to logs/squid/)
access_log stdio:/var/log/squid/access.log

# Cache log
cache_log stdio:/var/log/squid/cache.log

# --- Misc ---

# PID file
pid_filename /var/run/squid/squid.pid

# Shutdown timeout
shutdown_lifetime 5 seconds

# Minimal memory usage
cache_mem 16 MB
