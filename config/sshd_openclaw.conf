# Claw SSH hardening - copy to /etc/ssh/sshd_config.d/openclaw.conf
# NOTE: ForceCommand path is set dynamically by setup.sh
# This is a TEMPLATE - setup.sh will generate the actual config with correct paths

Match User openclaw-bot
    PasswordAuthentication no
    PubkeyAuthentication yes
    AllowTcpForwarding no
    X11Forwarding no
    PermitTunnel no
    AllowAgentForwarding no
    # ForceCommand is set by setup.sh based on OS (Linux: /home/, macOS: /Users/)
