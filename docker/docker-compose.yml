name: zupee-claw

services:
  ollama:
    image: ollama/ollama:0.20.3
    container_name: zupee-ollama
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEM:-4G}
          cpus: "${OLLAMA_CPUS:-1.5}"
    networks:
      - isolated
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION}
    container_name: zupee-claw
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:3000:3000"       # Web UI - localhost only, not exposed to network
    volumes:
      # Claw home directory — must be a single :rw directory mount because the gateway
      # writes config atomically via temp-file + rename, which is incompatible with
      # individual bind-mounted files (Docker bind mounts can't be replaced via rename).
      # Security: the entrypoint enforces read-only on personality files (SOUL.md, etc.)
      # at the filesystem level, and credentials/ is protected by host-side permissions.
      - ../openclaw-home:/home/openclaw/.openclaw:rw

      # Whitelisted scripts (read-only - container can see but not modify)
      - ../bin:/openclaw/bin:ro

      # SSH private key for host access (read-only)
      - ../config/openclaw-docker-key:/openclaw/.ssh/id_ed25519:ro

      # Audit logs (read-write)
      - ../logs:/openclaw/logs:rw
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - HTTP_PROXY=http://squid:3128
      - HTTPS_PROXY=http://squid:3128
      - NO_PROXY=ollama,localhost,127.0.0.1,host.docker.internal
      - http_proxy=http://squid:3128
      - https_proxy=http://squid:3128
      - no_proxy=ollama,localhost,127.0.0.1,host.docker.internal
      # For production, consider using Docker secrets instead of env vars
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      ollama:
        condition: service_healthy
      squid:
        condition: service_healthy
    networks:
      - isolated
      - host-access
      - squid-internal
      - web-access
    deploy:
      resources:
        limits:
          memory: ${CLAW_MEM:-1G}
          cpus: "${CLAW_CPUS:-1}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  squid:
    image: ubuntu/squid:latest
    container_name: zupee-squid
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
      - ../logs/squid:/var/log/squid:rw
    # To temporarily expose the proxy port for debugging, uncomment:
    # ports:
    #   - "127.0.0.1:3128:3128"
    networks:
      - squid-internal
      - squid-egress
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo -e 'HEAD / HTTP/1.0\\r\\n\\r\\n' > /dev/tcp/127.0.0.1/3128"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ollama-models:

networks:
  # Internal network - no outbound internet access
  isolated:
    driver: bridge
    internal: true

  # Network for SSH access to host only (openclaw container)
  host-access:
    driver: bridge
    internal: true

  # Internal network for openclaw <-> squid communication only (no internet)
  squid-internal:
    driver: bridge
    internal: true

  # Network for Web UI port publishing (localhost only).
  # NOT internal — Docker requires a non-internal network for port publishing to the host.
  # Verified: ports: directives are silently ignored on internal-only containers.
  # Internet bypass is mitigated by HTTP_PROXY/HTTPS_PROXY env vars on the container
  # and the port binding is restricted to 127.0.0.1 in the compose ports: directive.
  web-access:
    driver: bridge

  # Egress network for squid -> internet (Slack API)
  squid-egress:
    driver: bridge
