name: zupee-claw

services:
  # Ollama LLM inference — only used in Docker mode (OLLAMA_MODE=docker).
  # On macOS, run Ollama natively for Metal GPU acceleration instead.
  # Activate with: docker compose --profile docker-ollama up -d
  ollama:
    profiles: ["docker-ollama"]
    image: ollama/ollama:0.20.3
    container_name: zupee-ollama
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEM:-4G}
          cpus: "${OLLAMA_CPUS:-1.5}"
    networks:
      - isolated
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OPENCLAW_VERSION: ${OPENCLAW_VERSION}
    container_name: zupee-claw
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:3000:3000"       # Web UI - localhost only, not exposed to network
    volumes:
      # OpenClaw home — lives at ~/.openclaw on the host (not in the repo).
      # setup.sh creates this directory and copies personality files there.
      # The gateway manages openclaw.json and runtime state in this directory.
      - ${OPENCLAW_HOME:-~/.openclaw}:/home/openclaw/.openclaw:rw

      # Developer workspace — mounted so the agent can read/write code directly.
      # No SSH needed — OpenClaw's built-in read/write/edit/exec tools work on this.
      - ${WORKSPACE:-~/workspace}:/workspace:rw

      # Whitelisted scripts (read-only - container can see but not modify)
      - ../bin:/openclaw/bin:ro

      # SSH private key for host access (read-only, kept for run-claude)
      - ../config/openclaw-docker-key:/openclaw/.ssh/id_ed25519:ro

      # Audit logs (read-write)
      - ../logs:/openclaw/logs:rw
    environment:
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}
      # Clear OPENCLAW_HOME — .env sets it to the HOST path for volume mount interpolation,
      # but inside the container OpenClaw should use its default (~/.openclaw).
      - OPENCLAW_HOME=
      - HTTP_PROXY=http://squid:3128
      - HTTPS_PROXY=http://squid:3128
      # yamllint disable-line rule:line-length
      - NO_PROXY=ollama,searxng,valkey,localhost,127.0.0.1,host.docker.internal
      - http_proxy=http://squid:3128
      - https_proxy=http://squid:3128
      # yamllint disable-line rule:line-length
      - no_proxy=ollama,searxng,valkey,localhost,127.0.0.1,host.docker.internal
      # For production, consider using Docker secrets instead of env vars
      # Slack: user token mode (messages appear from the developer, not a bot)
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_USER_TOKEN=${SLACK_USER_TOKEN:-}
      # Legacy bot token (only if using bot mode instead of user token)
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Note: Ollama dependency removed — entrypoint.sh handles readiness check.
    # This allows running Ollama natively (outside Docker) on macOS for Metal GPU.
    depends_on:
      squid:
        condition: service_healthy
      searxng:
        condition: service_healthy
    networks:
      - isolated
      - host-access
      - squid-internal
      - web-access
    deploy:
      resources:
        limits:
          memory: ${CLAW_MEM:-1G}
          cpus: "${CLAW_CPUS:-1}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # SearXNG — self-hosted meta-search engine for web_search tool.
  # No API keys needed. Queries routed through Squid for audit + ACL control.
  searxng:
    image: searxng/searxng:2026.3.28-cf5389afd
    container_name: zupee-searxng
    # GRANIAN_NO_MULTIPROCESS: workaround for Python 3.14 multiprocessing bug in granian
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - SEARXNG_VALKEY_URL=redis://valkey:6379
      - GRANIAN_WORKERS=1
      - GRANIAN_NO_MULTIPROCESS=true
      - SEARXNG_LIMITER=false
      - http_proxy=http://squid:3128
      - https_proxy=http://squid:3128
      - no_proxy=valkey,localhost,127.0.0.1
    volumes:
      - ../config/searxng-settings.yml:/etc/searxng/settings.yml:ro
      - ../config/searxng-limiter.toml:/etc/searxng/limiter.toml:ro
    networks:
      - squid-internal
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    depends_on:
      valkey:
        condition: service_healthy
      squid:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Valkey (Redis-compatible) — cache for SearXNG search results
  valkey:
    image: valkey/valkey:8-alpine
    container_name: zupee-valkey
    networks:
      - squid-internal
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  squid:
    image: ubuntu/squid:latest
    container_name: zupee-squid
    volumes:
      - ../config/squid.conf:/etc/squid/squid.conf:ro
      - ../logs/squid:/var/log/squid:rw
    # To temporarily expose the proxy port for debugging, uncomment:
    # ports:
    #   - "127.0.0.1:3128:3128"
    networks:
      - squid-internal
      - squid-egress
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", ": </dev/tcp/127.0.0.1/3128"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ollama-models:

networks:
  # Internal network - no outbound internet access
  isolated:
    driver: bridge
    internal: true

  # Network for SSH access to host only (openclaw container)
  host-access:
    driver: bridge
    internal: true

  # Internal network for openclaw <-> squid communication only (no internet)
  squid-internal:
    driver: bridge
    internal: true

  # Network for Web UI port publishing (localhost only).
  # NOT internal — Docker requires a non-internal network for port publishing to the host.
  # Verified: ports: directives are silently ignored on internal-only containers.
  # Internet bypass is mitigated by HTTP_PROXY/HTTPS_PROXY env vars on the container
  # and the port binding is restricted to 127.0.0.1 in the compose ports: directive.
  web-access:
    driver: bridge

  # Egress network for squid -> internet (Slack API)
  squid-egress:
    driver: bridge
